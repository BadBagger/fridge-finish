name: Release Fridge Finish Plus APK

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/fridge-finish-plus-release.yml"

permissions:
  contents: write

jobs:
  release-apk:
    name: Build and publish 1.4 APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename installer
        run: cp app/build/outputs/apk/debug/app-debug.apk FridgeFinish-1.4-fridge-finish-plus-debug.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.4-fridge-finish-plus
          name: Fridge Finish 1.4 - Fridge Finish Plus
          body: |
            Adds the Fridge Finish Plus subscription model.

            - Free plan remains focused on basic fridge tracking.
            - Plus plan introduces advanced organization and planning gates.
            - Billing is a placeholder abstraction only; no fake purchase state is used.
            - Includes versionCode 5 / versionName 1.4-fridge-finish-plus.
          files: FridgeFinish-1.4-fridge-finish-plus-debug.apk
